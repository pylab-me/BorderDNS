[server]
default_timeout_ms = 5000
graceful_shutdown_ms = 10000

[listeners.udp]
enabled = true
listen = "0.0.0.0:5353"

[listeners.tcp]
enabled = true
listen = "0.0.0.0:5353"

[[upstreams.default]]
name = "alidns"
endpoint = "223.5.5.5:53"

[[upstreams.default]]
name = "cloudflare"
endpoint = "1.1.1.1:53"

[cache]
max_entries = 4096
min_ttl_secs = 5
max_ttl_secs = 86400
negative_ttl_secs = 30

[resolver]
location = "unknown"
