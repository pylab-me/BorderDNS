[resolver]
location = "china"

[server]
default_timeout_ms = 4500
graceful_shutdown_ms = 5000
max_concurrent = 1024

[listeners.udp]
enabled = true
listen = "0.0.0.0:5353"

[listeners.tcp]
enabled = false
listen = "0.0.0.0:5353"

# Default group (fallback for bootstrap / fallback routes)
[[upstreams.default]]
name = "alidns"
endpoint = "223.5.5.5:53"

# China group (route = china)
[[upstreams.china]]
name = "alidns-udp"
endpoint = "223.5.5.5:53"

[[upstreams.china]]
name = "alidns-tls"
transport = "tls"
endpoint = "223.5.5.5:853"
server_name = "dns.alidns.com"
timeout_ms = 4500

[[upstreams.china]]
name = "alidns-doh"
transport = "https"
endpoint = "https://dns.alidns.com/dns-query"
server_name = "dns.alidns.com"
timeout_ms = 5000

# Foreign group (route = foreign)
[[upstreams.foreign]]
name = "cloudflare-udp"
endpoint = "1.1.1.1:53"

[[upstreams.foreign]]
name = "cloudflare-tls"
transport = "tls"
endpoint = "1.1.1.1:853"
server_name = "one.one.one.one"
timeout_ms = 4500

[[upstreams.foreign]]
name = "cloudflare-doh"
transport = "https"
endpoint = "https://cloudflare-dns.com/dns-query"
server_name = "cloudflare-dns.com"
timeout_ms = 5000

# Cache
[cache]
max_entries = 4096
min_ttl_secs = 12
max_ttl_secs = 900
negative_ttl_secs = 30
enhanced_ttl_secs = 3600

# ─── Third-party observation ──────────────────────────────────────
# Optional: configure external observer peers for cross-location
# domain evidence collection.
[third_party]
enabled = false
# [[third_party.peers]]
# id = "cn-shanghai-1"
# endpoint = "https://cn-shanghai-1.example.com/observe"
# location = "china"
# trust_level = "normal"

# ─── Hosts Override ───────────────────────────────────────────────
# Static domain → IP overrides (like /etc/hosts).
[hosts]
enabled = false
ttl_secs = 60
# Inline entries (domain → IP list):
# [hosts.entries]
# "blocked.local" = ["127.0.0.1"]
#
# External hosts files (standard /etc/hosts format):
# files = ["/etc/hosts"]

# ─── Domain Block ─────────────────────────────────────────────────
# Block DNS requests for matching domains.
[block]
enabled = false
domains = []
suffixes = ["doubleclick.net"]
rules_files = [
    "/tmp/blocklist.txt",
    "/tmp/dns-hijack-list.txt",
]
blackhole_ipv4 = "0.0.0.0"
blackhole_ipv6 = "::"
# suppress_qtypes = ["HTTPS"]

# ─── Blackhole HTTP ───────────────────────────────────────────────
# HTTP listener returning 202 Accepted on redirect ports.
[blackhole]
enabled = false
listen = "0.0.0.0"
ports = [80, 443]
max_header_bytes = 32768

[speed_test]
enabled = false
