[resolver]
location = "china"

[server]
default_timeout_ms = 4500
graceful_shutdown_ms = 5000

[listeners.udp]
enabled = true
listen = "0.0.0.0:5353"

[listeners.tcp]
enabled = false
listen = "0.0.0.0:5353"

# Default group (fallback for bootstrap / fallback routes)
[[upstreams.default]]
name = "alidns"
endpoint = "223.5.5.5:53"

# China group (route = china)
[[upstreams.china]]
name = "alidns-tls"
transport = "tls"
endpoint = "223.5.5.5:853"
server_name = "dns.alidns.com"
timeout_ms = 4500

[[upstreams.foreign]]
name = "cloudflare-tls"
transport = "tls"
endpoint = "1.1.1.1:853"
server_name = "one.one.one.one"
timeout_ms = 4500

# Cache
[cache]
max_entries = 4096
min_ttl_secs = 12
max_ttl_secs = 900
negative_ttl_secs = 30

