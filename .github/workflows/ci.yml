name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: "1.88.0"

jobs:
  build:
    name: build-${{ matrix.id }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            os: ubuntu-latest
            archive_name: border-dns-linux-x64.tar.gz
            asset_dir: dist/border-dns-linux-x64
            rustflags: -C target-cpu=x86-64-v3
          - id: windows-x64
            os: windows-latest
            archive_name: border-dns-windows-x64.zip
            asset_dir: dist/border-dns-windows-x64
            rustflags: -C target-cpu=x86-64-v3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binaries
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release -p border-dns-cli --bins

      - name: Package Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ matrix.asset_dir }}"
          cp target/release/border-dns "${{ matrix.asset_dir }}/"
          cp target/release/border-dns-cli "${{ matrix.asset_dir }}/"
          cp tests/fixtures/default.toml "${{ matrix.asset_dir }}/"
          tar -C dist -czf "dist/${{ matrix.archive_name }}" "$(basename "${{ matrix.asset_dir }}")"

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ matrix.asset_dir }}" | Out-Null
          Copy-Item "target/release/border-dns.exe" "${{ matrix.asset_dir }}/"
          Copy-Item "target/release/border-dns-cli.exe" "${{ matrix.asset_dir }}/"
          Copy-Item "tests/fixtures/default.toml" "${{ matrix.asset_dir }}/"
          Compress-Archive -Path "${{ matrix.asset_dir }}/*" -DestinationPath "dist/${{ matrix.archive_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.id }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Show assets
        run: ls -lah release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
